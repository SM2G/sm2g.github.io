<!-- ======= Footer Section ======= -->

<!-- Social icon strip — external links only, max 3 -->
<div class="lt-socials" aria-label="Social links">
  {% assign external_links = links_sorted | where_exp: "l", "l.url contains 'http'" | where_exp: "l", "l.active != false" %}
  {% for link in external_links limit:2 %}
  <a href="{{ link.url }}" target="_blank" rel="noopener noreferrer" aria-label="{{ link.title }}"
    style="--btn-color: {{ link.color }}">
    <i class="{{ link.icon }}"></i>
  </a>
  {% endfor %}
</div>

<footer class="lt-footer">
  <p>© {{ site.time | date: '%Y' }} {{ site.author.name }}</p>
</footer>

</div>

<!-- End Footer -->
