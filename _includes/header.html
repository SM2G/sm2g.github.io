<!-- Avatar + identity -->
<header class="lt-header">

  <!-- SVG displacement filter for glitch distortion -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="glitch-distort" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence id="glitch-turb" type="turbulence"
          baseFrequency="0.05 0.08" numOctaves="3" seed="2"
          result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise"
          scale="0" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <div class="lt-avatar-ring" id="avatar-ring">
    <div class="lt-avatar">
      {% if site.data.base.avatar %}
      <img class="lt-avatar-img lt-avatar-img--main" src="{{ site.data.base.avatar }}" alt="{{ site.author.name }}"
        onerror="this.style.display='none'">
      <img class="lt-avatar-img lt-avatar-img--red"  src="{{ site.data.base.avatar }}" alt="" aria-hidden="true">
      <img class="lt-avatar-img lt-avatar-img--cyan" src="{{ site.data.base.avatar }}" alt="" aria-hidden="true">
      <span class="lt-avatar-fallback" style="display:none">{{ site.author.name | slice: 0 }}</span>
      {% else %}
      <span class="lt-avatar-fallback">{{ site.author.name | slice: 0 }}</span>
      {% endif %}
    </div>
  </div>
  <h1 class="lt-name">{{ site.author.name }}</h1>
  <p class="lt-bio">{{ site.author.bio }}</p>
</header>
